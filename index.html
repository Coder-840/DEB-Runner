<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>App Launcher</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1a1a1a; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 400px; border: 1px solid #333; }
        h1 { font-weight: 300; letter-spacing: -1px; margin-bottom: 2rem; text-align: center; }
        .deb-list { list-style: none; padding: 0; }
        .deb-item { background: #252525; padding: 12px; margin: 8px 0; border-radius: 6px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .deb-item:hover { background: #333; border-color: #444; transform: translateY(-2px); }
        .launch-btn { color: #00ff88; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <h1>App Launcher</h1>
        <ul id="list" class="deb-list">
            <!-- Loaded via JS -->
            <li class="deb-item">Scanning for .deb files...</li>
        </ul>
    </div>
    <script>
        // Simple logic to list files and open the VNC tab
        async function loadApps() {
            const list = document.getElementById('list');
            // In a real setup, this would fetch from a tiny node server
            const debs = ["vlc.deb", "discord.deb"]; // Placeholder
            list.innerHTML = debs.map(d => `
                <li class="deb-item" onclick="launch('${d}')">
                    <span>${d}</span>
                    <span class="launch-btn">Launch →</span>
                </li>
            `).join('');
        }
        function launch(file) {
            // Opens the noVNC desktop in a new tab
            window.open(window.location.origin.replace('3000', '6080') + '/vnc.html?autoconnect=true', '_blank');
            // Trigger server-side install/run via fetch
            fetch(`/run?file=${file}`);
        }
        loadApps();
    </script>
</body>
</html>
